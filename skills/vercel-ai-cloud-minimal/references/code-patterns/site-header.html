<!-- Component: site-header
     Black nav with Vercel-like triangle mark, muted product links, dark utility buttons, white sign-up CTA. -->
<style>
  :root {
    --canvas: #000;
    --ink: #fff;
    --ink-muted: #a1a1a1;
    --hairline: rgba(255,255,255,.13);
    --sans: Geist, Inter, Arial, sans-serif;
  }
  .vc-header {
    background: var(--canvas);
    color: var(--ink);
    font-family: var(--sans);
  }
  .vc-header .inner {
    height: 64px;
    max-width: 1240px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .vc-brand {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    color: var(--ink);
    font-size: 22px;
    font-weight: 650;
    letter-spacing: -0.04em;
    text-decoration: none;
  }
  .vc-triangle {
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 18px solid currentColor;
  }
  .vc-nav {
    display: flex;
    gap: 26px;
  }
  .vc-nav a,
  .vc-login {
    color: var(--ink-muted);
    font-size: 14px;
    font-weight: 520;
    text-decoration: none;
  }
  .vc-actions {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .vc-action {
    display: inline-flex;
    min-height: 34px;
    align-items: center;
    justify-content: center;
    padding: 0 14px;
    border: 1px solid var(--hairline);
    border-radius: 8px;
    background: #080808;
    color: var(--ink);
    font-size: 14px;
    font-weight: 560;
    text-decoration: none;
  }
  .vc-action.primary {
    background: #fff;
    color: #000;
  }
  @media (max-width: 820px) {
    .vc-nav { display: none; }
  }
</style>

<header class="vc-header">
  <div class="inner">
    <a class="vc-brand" href="#"><span class="vc-triangle"></span>Vercel</a>
    <nav class="vc-nav">
      <a href="#">Products</a>
      <a href="#">Resources</a>
      <a href="#">Solutions</a>
      <a href="#">Enterprise</a>
      <a href="#">Pricing</a>
    </nav>
    <div class="vc-actions">
      <a class="vc-action" href="#">Ask AI</a>
      <a class="vc-action" href="#">Log In</a>
      <a class="vc-action primary" href="#">Sign Up</a>
    </div>
  </div>
</header>
