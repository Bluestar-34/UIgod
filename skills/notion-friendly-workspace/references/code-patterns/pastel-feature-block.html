<!-- Component: pastel-feature-block
     Whole-pastel feature section: copy on one side, white art card on a single pastel background.
     Swap the feat-* class to retheme: feat-blue, feat-yellow, feat-coral, feat-teal.
     Each block should commit to ONE pastel — do not mix several into confetti. -->
<style>
  :root {
    --ink-strong: rgba(0,0,0,0.95);
    --ink: rgba(0,0,0,0.898);
    --hairline: rgba(0,0,0,0.09);
    --primary: #455dd3;
    --block-blue: #62aef0;
    --block-yellow: #ffc95e;
    --block-coral: #f77463;
    --block-teal: #2a9d99;
    --sans: Inter, NotionInter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --shadow-soft: 0 1px 2px rgba(0,0,0,0.06), 0 6px 20px rgba(0,0,0,0.06);
    --shadow-lift: 0 2px 4px rgba(0,0,0,0.06), 0 12px 32px rgba(0,0,0,0.09);
  }
  .wf-feature {
    font-family: var(--sans);
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    border-radius: 16px; overflow: hidden;
    box-shadow: var(--shadow-soft); max-width: 1080px; margin: 0 auto;
  }
  .wf-feature .copy {
    padding: 56px; display: flex; flex-direction: column; justify-content: center; background: #fff;
  }
  .wf-feature .copy h3 { font-size: 30px; font-weight: 700; letter-spacing: -0.01em; color: var(--ink-strong); line-height: 1.18; }
  .wf-feature .copy p { font-size: 17px; color: var(--ink); margin-top: 16px; max-width: 380px; line-height: 1.6; }
  .wf-feature .copy a.learn {
    margin-top: 22px; font-size: 15px; font-weight: 600; color: var(--ink-strong);
    text-decoration: none; align-self: flex-start; border-bottom: 2px solid currentColor; padding-bottom: 1px;
  }
  .wf-feature .art { min-height: 300px; display: grid; place-items: center; padding: 40px; }
  .feat-blue { background: var(--block-blue); }
  .feat-yellow { background: var(--block-yellow); }
  .feat-coral { background: var(--block-coral); }
  .feat-teal { background: var(--block-teal); }
  .wf-feature .art-card {
    width: 100%; max-width: 300px; background: #fff; border-radius: 12px;
    box-shadow: var(--shadow-lift); padding: 22px;
  }
  .wf-feature .ac-title { height: 20px; width: 60%; border-radius: 5px; background: var(--ink-strong); opacity: .85; margin-bottom: 16px; }
  .wf-feature .ac-line { height: 10px; border-radius: 4px; background: var(--hairline); margin-bottom: 10px; }
  .wf-feature .ac-line.s { width: 70%; }
  .wf-feature .ac-pill { display: inline-block; height: 22px; width: 90px; border-radius: 9999px; background: color-mix(in srgb, var(--primary) 18%, #fff); margin-top: 12px; }

  @media (max-width: 860px) {
    .wf-feature { grid-template-columns: 1fr; }
    .wf-feature .copy { padding: 40px 32px; }
    .wf-feature .art { min-height: 220px; }
  }
</style>

<section class="wf-feature">
  <div class="copy">
    <h3>Docs that feel like a fresh page.</h3>
    <p>Start typing and let structure follow. Clean, calm, and quietly powerful — never in your way.</p>
    <a class="learn" href="#">Explore Docs</a>
  </div>
  <div class="art feat-blue">
    <div class="art-card">
      <div class="ac-title"></div>
      <div class="ac-line"></div>
      <div class="ac-line"></div>
      <div class="ac-line s"></div>
      <span class="ac-pill"></span>
    </div>
  </div>
</section>
