<!-- Component: campaign-header
     Dark Notion-like campaign nav: square wordmark, slim links, primary CTA, login link. -->
<style>
  :root {
    --primary: #455dd3;
    --primary-strong: #213183;
    --hero-midnight: #000530;
    --sans: NotionInter, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .nf-header {
    background: var(--hero-midnight);
    color: #fff;
    font-family: var(--sans);
  }

  .nf-header .inner {
    max-width: 1160px;
    height: 72px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 26px;
  }

  .nf-brand-mark {
    display: grid;
    width: 32px;
    height: 32px;
    place-items: center;
    border: 2px solid currentColor;
    border-radius: 8px;
    box-shadow: -3px 3px 0 rgba(255, 255, 255, 0.2);
    font-family: Georgia, serif;
    font-size: 19px;
    font-weight: 800;
  }

  .nf-header nav {
    display: flex;
    gap: 23px;
    margin-left: auto;
  }

  .nf-header nav a,
  .nf-header .login {
    color: rgba(255, 255, 255, 0.9);
    font-size: 14px;
    font-weight: 650;
    text-decoration: none;
  }

  .nf-actions {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-left: 16px;
  }

  .nf-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    padding: 10px 18px;
    background: var(--primary);
    color: #fff;
    font: 650 14px/1 var(--sans);
    text-decoration: none;
  }

  .nf-btn:hover { background: var(--primary-strong); }

  @media (max-width: 900px) {
    .nf-header nav { display: none; }
    .nf-actions { margin-left: auto; }
  }
</style>

<header class="nf-header">
  <div class="inner">
    <a class="nf-brand-mark" href="#">N</a>
    <nav>
      <a href="#">Product</a>
      <a href="#">AI</a>
      <a href="#">Solutions</a>
      <a href="#">Resources</a>
      <a href="#">Pricing</a>
    </nav>
    <div class="nf-actions">
      <a class="nf-btn" href="#">Get Notion free</a>
      <a class="login" href="#">Log in</a>
    </div>
  </div>
</header>
